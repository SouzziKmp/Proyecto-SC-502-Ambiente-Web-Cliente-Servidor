<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos Registrados</title>
    <link rel="stylesheet" href="../css/equipos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="bootstrap.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <header>
        <nav class="navbar bg-dark border-bottom border-body p-3" data-bs-theme="dark">
            <div class="container-fluid d-flex justify-content-between align-items-center">

                <h1 class="h4 text-white m-0">Sistema de prestamo de equipo</h1>

                <ul id="nav-menu" class="d-flex align-items-center list-unstyled m-0 gap-3">
                    <li><a href="#" class="nav-link text-white">Usuarios</a></li>
                    <li><a href="#" class="nav-link text-white">Devoluciones</a></li>
                    <li><a href="#" class="nav-link text-white">Equipos</a></li>
                    <li><a href="#" class="nav-link text-white">Prestamos</a></li>

                    <li class="dropdown">
                        <button class="btn btn-secondary" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Logout <i class="bi bi-box-arrow-in-right"></i>
                        </button>
                        
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main >
        <section class="equiposRegistrados container">
            <h1 class="text-center mb-4">Inventario de Equipos</h1>

            <div class="d-flex justify-content-between mb-3">

                <a href="registrar_equipo.html" class="btn btn-success">
                    Registrar nuevo equipo
                </a>

                <input type="text" class="form-control w-25" placeholder="Buscar equipo...">

            </div>

            <div class="card shadow">
                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-striped table-bordered" style="table-layout: fixed;">

                            <thead class="table-dark">
                                <tr>
                                    <th scope="col" style="width: 12.5%;">Imagen</th>
                                    <th scope="col" style="width: 12.5%;">Código</th>
                                    <th scope="col" style="width: 12.5%;">Tipo</th>
                                    <th scope="col" style="width: 12.5%;">Marca</th>
                                    <th scope="col" style="width: 12.5%;">Modelo</th>
                                    <th scope="col" style="width: 12.5%;">Número de Serie</th>
                                    <th scope="col" style="width: 12.5%;">Estado</th>
                                    <th scope="col" style="width: 12.5%;">Acciones</th>

                                </tr>
                            </thead>

                            <tbody id="tablaEquipos">

                            </tbody>

                        </table>

                    </div>

                </div>
            </div>
        </section>
         <script src="../js/equipos.js"></script>
    </main>

   
    <footer>
        <p>&copy; 2026 Sistema de prestamo de equipos</p>
    </footer>
