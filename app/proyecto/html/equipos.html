<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos Registrados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="bootstrap.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<main class="container mt-5">

    <h1 class="text-center mb-4">Inventario de Equipos</h1>

    <div class="d-flex justify-content-between mb-3">

        <a href="registrar_equipo.html" class="btn btn-success">
            Registrar nuevo equipo
        </a>

        <input type="text" class="form-control w-25" placeholder="Buscar equipo...">

    </div>

    <div class="card shadow">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-bordered" style="table-layout: fixed;">

                    <thead class="table-dark">
                        <tr>
                            <th scope="col" style="width: 12.5%;">Imagen</th>
                            <th scope="col" style="width: 12.5%;">Código</th>
                            <th scope="col" style="width: 12.5%;">Tipo</th>
                            <th scope="col" style="width: 12.5%;">Marca</th>
                            <th scope="col" style="width: 12.5%;">Modelo</th>
                            <th scope="col" style="width: 12.5%;">Número de Serie</th>
                            <th scope="col" style="width: 12.5%;">Estado</th>
                            <th scope="col" style="width: 12.5%;">Acciones</th>
                            
                        </tr>
                    </thead>

                    <tbody id="tablaEquipos">
                       
                    </tbody>

                </table>

            </div>

        </div>
    </div>

</main>

<script src="../js/equipos.js"></script>

</body>

</html>
