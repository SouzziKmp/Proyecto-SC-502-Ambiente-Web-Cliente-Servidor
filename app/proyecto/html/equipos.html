<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos Registrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="bootstrap.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <main class="container mt-5">
        <h1 class="text-center mb-4">Inventario de Equipos</h1>

        <div class="d-flex justify-content-between mb-3">

            <a href="/registrar_equipo" class="btn btn-success">
                Registrar nuevo equipo
            </a>

            <input type="text" class="form-control w-25" placeholder="Buscar equipo...">

        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-bordered">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col">Imagen</th>
                                <th scope="col">Código</th>
                                <th scope="col">Tipo</th>
                                <th scope="col">Marca</th>
                                <th scope="col">Modelo</th>
                                <th scope="col">Número de Serie</th>
                                <th scope="col">Estado</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for equipo in equipos %}
                            <tr>

                                <td>
                                    <img src="{{ equipo.imagen }}" width="80" class="img-thumbnail">
                                </td>


                                <td>{{ equipo.codigo }}</td>
                                <td>{{ equipo.tipo }}</td>
                                <td>{{ equipo.marca }}</td>
                                <td>{{ equipo.modelo }}</td>
                                <td>{{ equipo.numero_serie }}</td>
                                <td>{{ equipo.estado }}</td>
                                <td>
                                    <button class="btn btn-primary btn-sm">
                                        Prestar
                                    </button>

                                    <button class="btn btn-warning btn-sm">
                                        Editar
                                    </button>

                                    <button class="btn btn-danger btn-sm">
                                        Eliminar
                                    </button>
                                </td>

                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>



</body>



</html>
