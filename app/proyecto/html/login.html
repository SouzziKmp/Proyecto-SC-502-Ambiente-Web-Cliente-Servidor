<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body> 
    <header>
        <nav class="navbar bg-dark border-bottom border-body p-3" data-bs-theme="dark">
            <div class="container-fluid d-flex justify-content-between align-items-center">

                <h1 class="h4 text-white m-0">Sistema de prestamo de equipo</h1>

                <ul id="nav-menu" class="d-flex align-items-center list-unstyled m-0 gap-3">
                    <li><a href="#" class="nav-link text-white"><i class="bi-house-fill "></i> Home</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">

        <section class="caja">
            
            <div class="row g-0 align-items-stretch">
                <div class="col-md-6 col-img">
                    <img src="../img/Bienvenida.png" alt="Bienvenida" class="img-fluid">
                </div>

                <div class="col-md-6 d-flex align-items-center">
                    <div class="formLogIn w-100">
                        <h2>Ingresar al sistema</h2>
                        <form>
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="username" placeholder="Ingrese su usuario">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password"
                                    placeholder="Ingrese su contraseña">
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Ingresar</button>
                                <button type="button" class="btn btn-outline-primary">Crear cuenta</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Sistema de prestamo de equipos</p>
    </footer>
</body>

</html>
