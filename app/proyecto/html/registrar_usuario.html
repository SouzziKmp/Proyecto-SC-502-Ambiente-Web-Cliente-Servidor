<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <header>
        <nav class="navbar bg-dark border-bottom border-body p-3" data-bs-theme="dark">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <h1 class="h4 text-white m-0">Sistema de prestamo de equipo</h1>
                <ul id="nav-menu" class="d-flex align-items-center list-unstyled m-0 gap-3">
                    <li><a href="#" class="nav-link text-white">Usuarios</a></li>
                    <li><a href="#" class="nav-link text-white">Devoluciones</a></li>
                    <li><a href="#" class="nav-link text-white">Equipos</a></li>
                    <li><a href="#" class="nav-link text-white">Prestamos</a></li>
                    <li class="dropdown">
                        <button class="btn btn-secondary" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Logout <i class="bi bi-box-arrow-in-right"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h1 class="text-center mb-4">Registro de Usuario</h1>
                        <form action="/registrar_usuario" method="post">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo</label>
                                <input type="email" class="form-control" id="correo" name="correo" required>
                            </div>
                            <div class="mb-3">
                                <label for="rol" class="form-label">Rol del Sistema</label>
                                <select class="form-select" id="rol" name="rol" required>
                                    <option value="">Seleccione un rol</option>
                                    <option value="Admin">Administrador</option>
                                    <option value="Docente">Docente</option>
                                    <option value="Estudiante">Estudiante</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contrasena</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Registrar Usuario</button>
                                <a href="usuarios.html" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
    </main>
    <footer>
        <p>&copy; 2026 Sistema de prestamo de equipos</p>
    </footer>
</body>
</html>
