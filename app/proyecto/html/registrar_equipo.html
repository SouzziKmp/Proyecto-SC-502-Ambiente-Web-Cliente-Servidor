<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Equipo</title>
    <link rel="stylesheet" href="../css/registrar_equipo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <header>
        <nav class="navbar bg-dark border-bottom border-body p-3" data-bs-theme="dark">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <h1 class="h4 text-white m-0">Sistema de prestamo de equipo</h1>
                <ul id="nav-menu" class="d-flex align-items-center list-unstyled m-0 gap-3">
                 <li><a href="usuarios.html" class="nav-link text-white">Usuarios</a></li>
                    <li><a href="devoluciones.html" class="nav-link text-white">Devoluciones</a></li>
                    <li><a href="equipos.html" class="nav-link text-white">Equipos</a></li>
                    <li><a href="prestamo.html" class="nav-link text-white fw-bold">Prestamos</a></li>
                    <li class="dropdown">
                        <button class="btn btn-secondary" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Logout <i class="bi bi-box-arrow-in-right"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="registrarEquipo">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <h1 class="text-center mb-4">Registrar Equipos y Periféricos</h1>
                                <form action="/registrar_equipo" method="post">
                                    <div class="mb-3">
                                        <label for="codigo" class="form-label">Codigo del equipo</label>
                                        <input type="text" class="form-control" id="codigo" name="codigo" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="tipo" class="form-label">Tipo de equipo</label>
                                        <select class="form-select" id="tipo" name="tipo" required>
                                            <option value="">Seleccione un tipo</option>
                                            <optgroup label="Equipos">
                                                <option value="desktop">Desktop</option>
                                                <option value="laptop">Laptop</option>
                                                <option value="tablet">Tablet</option>
                                            </optgroup>
                                            <optgroup label="Periféricos">
                                                <option value="monitor">Monitor</option>
                                                <option value="teclado">Teclado</option>
                                                <option value="mouse">Mouse</option>
                                                <option value="impresora">Impresora</option>
                                                <option value="proyector">Proyector</option>
                                            </optgroup>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="marca" class="form-label">Marca</label>
                                        <input type="text" class="form-control" id="marca" name="marca" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="modelo" class="form-label">Modelo</label>
                                        <input type="text" class="form-control" id="modelo" name="modelo" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="serie" class="form-label">Número de serie</label>
                                        <input type="text" class="form-control" id="serie" name="serie" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="estado" class="form-label">Estado</label>
                                        <select class="form-select" id="estado" name="estado" required>
                                            <option value="">Seleccione un estado</option>
                                            <option value="disponible">Disponible</option>
                                            <option value="prestado">Prestado</option>
                                            <option value="en reparacion">En reparación</option>
                                        </select>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">
                                            Registrar Equipo
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sistema de prestamo de equipos</p>
    </footer>

</body>
</html>
