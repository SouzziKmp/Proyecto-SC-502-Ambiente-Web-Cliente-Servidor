<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrar Equipo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="bootstrap.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>



<body>
    <main>
        <section class="mt-5">
            <div id="formulario" class="container">

                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <h1 class="text-center mb-4">Registrar Equipos y Perifericos</h1>
                                <form action="/registrar_equipo" method="post">
                                    <div class="mb-3">
                                        <label for="codigo" class="form-label">Codigo del equipo</label>
                                        <input type="text" class="form-control" id="codigo" name="codigo" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="tipo" class="form-label">Tipo de equipo</label>

                                        <select class="form-select" id="tipo" name="tipo" required>
                                            <option value="">Seleccione un tipo</option>

                                            <optgroup label="Equipos">
                                                <option value="desktop">Desktop</option>
                                                <option value="laptop">Laptop</option>
                                                <option value="tablet">Tablet</option>
                                            </optgroup>

                                            <optgroup label="Periféricos">
                                                <option value="monitor">Monitor</option>
                                                <option value="teclado">Teclado</option>
                                                <option value="mouse">Mouse</option>
                                                <option value="impresora">Impresora</option>
                                                <option value="proyector">Proyector</option>
                                            </optgroup>

                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label for="marca" class="form-label">Marca</label>
                                        <input type="text" class="form-control" id="marca" name="marca" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="modelo" class="form-label">Modelo</label>
                                        <input type="text" class="form-control" id="modelo" name="modelo" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="serie" class="form-label">Número de serie</label>
                                        <input type="text" class="form-control" id="serie" name="serie" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="estado" class="form-label">Estado</label>
                                        <select class="form-select" id="estado" name="estado" required>
                                            <option value="">Seleccione un estado</option>
                                            <option value="disponible">Disponible</option>
                                            <option value="prestado">Prestado</option>
                                            <option value="en reparacion">En reparación</option>

                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Registrar</button>


                                </form>
                            </div>      
                        </div>      
                </div>      
                




        </section>










    </main>






</body>




</html>
