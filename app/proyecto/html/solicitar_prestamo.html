<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Préstamo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <main>
        <section class="mt-5">
            <div id="formulario" class="container">

                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card shadow">
                            <div class="card-body">
                                <h1 class="text-center mb-4">Solicitar Préstamo</h1>

                                <form id="formPrestamo">

                                    <div class="mb-3">
                                        <label for="usuario" class="form-label">Usuario</label>
                                        <input type="text" class="form-control" id="usuario" name="usuario" required>
                                    </div>

                                    <div class="mb-3">
                                        <label for="equipo" class="form-label">Equipo disponible</label>
                                        <select class="form-select" id="equipo" name="equipo" required>
                                            <option value="">Seleccione un equipo</option>
                                            <option value="Laptop Dell Inspiron">Laptop Dell Inspiron</option>
                                            <option value="Laptop HP ProBook">Laptop HP ProBook</option>
                                            <option value="Tablet Samsung Galaxy Tab">Tablet Samsung Galaxy Tab</option>
                                            <option value="Proyector Epson X39">Proyector Epson X39</option>
                                            <option value="Monitor LG 24 pulgadas">Monitor LG 24 pulgadas</option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label for="fechaPrestamo" class="form-label">Fecha de préstamo</label>
                                        <input type="date" class="form-control" id="fechaPrestamo" name="fechaPrestamo" required>
                                    </div>

                                    <div class="mb-3">
                                        <label for="fechaDevolucion" class="form-label">Fecha de devolución</label>
                                        <input type="date" class="form-control" id="fechaDevolucion" name="fechaDevolucion" required>
                                    </div>

                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary">
                                            Solicitar Préstamo
                                        </button>

                                        <a href="prestamo.html" class="btn btn-secondary mt-2">
                                            Volver al módulo de préstamos
                                        </a>
                                    </div>

                                </form>

                                <div id="mensajePrestamo" class="mt-3"></div>

                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="../js/script.js"></script>
</body>

</html>
