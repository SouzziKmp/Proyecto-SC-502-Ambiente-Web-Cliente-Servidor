<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoluciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<main class="container mt-5">
    <h1 class="text-center mb-4">Retorno de Equipos</h1>

    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card shadow border-warning">
                <div class="card-header bg-warning text-dark"><strong>Registrar Nueva Devolucion</strong></div>
                <div class="card-body">
                    <form class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Codigo de Equipo</label>
                            <input type="text" class="form-control" placeholder="Ej: LPT-001">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Estado de Entrega</label>
                            <select class="form-select">
                                <option value="bueno">Buen estado</option>
                                <option value="danado">Con danos</option>
                                <option value="falla">Fallo tecnico</option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-warning w-100">Procesar Devolucion</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <h3 class="mb-3">Historial Reciente de Prestamos</h3>
    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Usuario</th>
                        <th>Equipo</th>
                        <th>Fecha Prestamo</th>
                        <th>Fecha Devolucion</th>
                        <th>Observaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Pablo Barquero</td>
                        <td>Laptop Dell (SR-123)</td>
                        <td>2026-03-01</td>
                        <td>2026-03-05</td>
                        <td>Entregado a tiempo</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
